<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" aria-label="Cinema Night UML class and navigation diagram">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3d8b9a"/>
    </marker>
    <marker id="inherit" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#012b55"/>
    </marker>
    <style>
      .title { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #012b55; }
      .subtitle { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #3d8b9a; }
      .label { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #012b55; }
      .text { font: 11px "Segoe UI", Arial, sans-serif; fill: #1a2b3c; }
      .small { font: 10px "Segoe UI", Arial, sans-serif; fill: #4a5d6e; }
      .box { fill: #f7fafb; stroke: #012b55; stroke-width: 1.5; }
      .box-accent { fill: #eef6f7; stroke: #3d8b9a; stroke-width: 1.5; }
      .box-form { fill: #fff; stroke: #6b8a9a; stroke-width: 1.2; stroke-dasharray: 4 3; }
      .divider { stroke: #d8e3ea; stroke-width: 1; }
      .line { stroke: #3d8b9a; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .inherit { stroke: #012b55; stroke-width: 1.5; fill: none; marker-end: url(#inherit); }
    </style>
  </defs>

  <rect width="1120" height="720" fill="#ffffff"/>
  <text x="40" y="36" class="title">Cinema Night  UML Overview</text>
  <text x="40" y="58" class="subtitle">Domain model, persistence, and WinForms navigation</text>

  <!-- Domain model -->
  <text x="40" y="88" class="label">Domain model</text>

  <rect x="40" y="100" width="200" height="118" rx="6" class="box"/>
  <text x="52" y="122" class="label">«abstract» Kullanici</text>
  <line x1="40" y1="130" x2="240" y2="130" class="divider"/>
  <text x="52" y="148" class="small">+ Ad, Soyad, TC, KullaniciAdi</text>
  <text x="52" y="164" class="small">+ Sifre, Cinsiyet, DogumTarihi</text>
  <text x="52" y="180" class="small">+ UyelikTuru, UyelikUcreti</text>
  <text x="52" y="200" class="small">+ KullaniciGuncelle()</text>

  <rect x="280" y="100" width="170" height="72" rx="6" class="box-accent"/>
  <text x="292" y="122" class="label">PremiumKullanici</text>
  <line x1="280" y1="130" x2="450" y2="130" class="divider"/>
  <text x="292" y="150" class="small">+ UyelikUcretiHesapla()</text>
  <text x="292" y="166" class="small">+ reviews &amp; ratings</text>

  <rect x="280" y="190" width="170" height="72" rx="6" class="box-accent"/>
  <text x="292" y="212" class="label">StandartKullanici</text>
  <line x1="280" y1="220" x2="450" y2="220" class="divider"/>
  <text x="292" y="240" class="small">+ UyelikUcretiHesapla()</text>
  <text x="292" y="256" class="small">+ browse &amp; watchlist</text>

  <rect x="40" y="240" width="200" height="88" rx="6" class="box"/>
  <text x="52" y="262" class="label">AdminKullanici</text>
  <line x1="40" y1="270" x2="240" y2="270" class="divider"/>
  <text x="52" y="288" class="small">+ film CRUD permissions</text>
  <text x="52" y="304" class="small">+ KullaniciGuncelle()</text>
  <text x="52" y="320" class="small">account delete disabled</text>

  <line x1="240" y1="145" x2="280" y2="136" class="inherit"/>
  <line x1="240" y1="155" x2="280" y2="226" class="inherit"/>

  <rect x="490" y="100" width="190" height="104" rx="6" class="box"/>
  <text x="502" y="122" class="label">Film</text>
  <line x1="490" y1="130" x2="680" y2="130" class="divider"/>
  <text x="502" y="148" class="small">+ FilmAdi, YayinYili, Tur</text>
  <text x="502" y="164" class="small">+ IMDBPuani, Yonetmen</text>
  <text x="502" y="180" class="small">+ Oyuncular, Aciklama, Afis</text>
  <text x="502" y="196" class="small">stored in PostgreSQL</text>

  <rect x="490" y="224" width="190" height="104" rx="6" class="box"/>
  <text x="502" y="246" class="label">FilmYorum</text>
  <line x1="490" y1="254" x2="680" y2="254" class="divider"/>
  <text x="502" y="272" class="small">+ KullaniciID, FilmID</text>
  <text x="502" y="288" class="small">+ YorumMetni, KullaniciPuani</text>
  <text x="502" y="304" class="small">+ YorumuVeritabaninaEkle()</text>

  <line x1="585" y1="204" x2="585" y2="224" class="line" marker-end="url(#arrow)"/>
  <text x="592" y="218" class="small">1..*</text>

  <rect x="710" y="130" width="170" height="90" rx="6" class="box-accent"/>
  <text x="722" y="152" class="label">PostgreSQL</text>
  <line x1="710" y1="160" x2="880" y2="160" class="divider"/>
  <text x="722" y="178" class="small">users, films</text>
  <text x="722" y="194" class="small">reviews, watchlists</text>
  <text x="722" y="210" class="small">via Npgsql / ADO.NET</text>

  <line x1="680" y1="152" x2="710" y2="175" class="line"/>
  <line x1="240" y1="284" x2="710" y2="175" class="line" style="stroke-dasharray:5 4"/>

  <!-- Forms navigation -->
  <text x="40" y="368" class="label">WinForms navigation</text>

  <rect x="40" y="382" width="110" height="48" rx="6" class="box-form"/>
  <text x="52" y="412" class="text">Form1</text>
  <text x="52" y="400" class="small">guest browse</text>

  <rect x="190" y="382" width="130" height="48" rx="6" class="box-form"/>
  <text x="202" y="400" class="small">login / register</text>
  <text x="202" y="412" class="text">Login_UyeOl</text>

  <rect x="360" y="352" width="110" height="48" rx="6" class="box-form"/>
  <text x="372" y="382" class="text">Admin</text>

  <rect x="360" y="412" width="110" height="48" rx="6" class="box-form"/>
  <text x="372" y="442" class="text">Standart</text>

  <rect x="360" y="472" width="110" height="48" rx="6" class="box-form"/>
  <text x="372" y="502" class="text">Premium</text>

  <rect x="520" y="382" width="130" height="48" rx="6" class="box-form"/>
  <text x="532" y="400" class="small">profile &amp; watchlist</text>
  <text x="532" y="412" class="text">Profilim</text>

  <rect x="520" y="472" width="150" height="48" rx="6" class="box-form"/>
  <text x="532" y="490" class="small">film details / reviews</text>
  <text x="532" y="502" class="text">FilmDetaylari</text>

  <rect x="360" y="292" width="130" height="48" rx="6" class="box-form"/>
  <text x="372" y="310" class="small">admin CRUD</text>
  <text x="372" y="322" class="text">AdminPanel</text>

  <line x1="150" y1="406" x2="190" y2="406" class="line"/>
  <line x1="320" y1="396" x2="360" y2="376" class="line"/>
  <line x1="320" y1="406" x2="360" y2="436" class="line"/>
  <line x1="320" y1="416" x2="360" y2="496" class="line"/>
  <line x1="415" y1="352" x2="415" y2="340" class="line"/>
  <line x1="470" y1="376" x2="520" y2="406" class="line"/>
  <line x1="470" y1="436" x2="520" y2="406" class="line"/>
  <line x1="470" y1="496" x2="520" y2="496" class="line"/>
  <line x1="595" y1="430" x2="595" y2="472" class="line"/>

  <!-- Tech strip -->
  <rect x="40" y="560" width="1040" height="120" rx="8" fill="#f0f5f7" stroke="#d8e3ea"/>
  <text x="60" y="588" class="label">Stack</text>
  <text x="60" y="612" class="text">C# · .NET Framework · Windows Forms · Visual Studio 2022</text>
  <text x="60" y="632" class="text">PostgreSQL · Npgsql · ADO.NET · LINQ</text>
  <text x="60" y="652" class="text">Material Skin · Notifcylon · Stream / MemoryStream (posters)</text>
  <text x="560" y="612" class="text">Features: auth, premium tier, admin film CRUD,</text>
  <text x="560" y="632" class="text">filter/sort/search, watchlist, reviews, notifications</text>
  <text x="560" y="652" class="small">Team: Dilber Özer · Ecem ^im_ek  OOP course final project</text>
</svg>
