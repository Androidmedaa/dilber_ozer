<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1080" role="img" aria-label="Cinema Night system architecture diagram">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ffffff"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#8b3050" flood-opacity="0.25"/>
    </filter>
    <style>
      .bg-title { font: 700 34px Georgia, "Times New Roman", serif; fill: #ffffff; letter-spacing: 0.06em; }
      .bg-sub { font: 600 15px "Segoe UI", Arial, sans-serif; fill: rgba(255,255,255,0.92); }
      .card-h { font: 700 15px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .card-tag { font: 600 11px "Segoe UI", Arial, sans-serif; fill: rgba(255,255,255,0.75); }
      .card-vars { font: 600 12px "Consolas", "Courier New", monospace; fill: #ffffff; }
      .card-fn { font: 11.5px "Consolas", "Courier New", monospace; fill: rgba(255,255,255,0.95); }
      .edge-label { font: 600 11px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .note { font: italic 11px Georgia, serif; fill: rgba(255,255,255,0.7); }
      .deco { fill: none; stroke: rgba(255,255,255,0.35); stroke-width: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1500" height="1080" fill="#e8899a"/>
  <rect width="1500" height="1080" fill="url(#grid)"/>

  <!-- Decorative film strip -->
  <g opacity="0.45">
    <rect x="60" y="90" width="120" height="72" rx="4" class="deco"/>
    <rect x="72" y="102" width="18" height="48" fill="rgba(255,255,255,0.2)"/>
    <rect x="96" y="102" width="18" height="48" fill="rgba(255,255,255,0.2)"/>
    <rect x="120" y="102" width="18" height="48" fill="rgba(255,255,255,0.2)"/>
    <rect x="144" y="102" width="18" height="48" fill="rgba(255,255,255,0.2)"/>
    <circle cx="1320" cy="180" r="36" class="deco"/>
    <circle cx="1320" cy="180" r="14" class="deco"/>
    <rect x="1280" y="880" width="90" height="56" rx="6" class="deco"/>
  </g>

  <text x="750" y="62" text-anchor="middle" class="bg-title">CINEMA NIGHT</text>
  <text x="750" y="88" text-anchor="middle" class="bg-sub">WinForms System Architecture · UML Form Navigation</text>

  <!-- Helper: form card template via groups -->

  <!-- Login_UyeOl -->
  <g filter="url(#shadow)" transform="translate(80, 620)">
    <rect width="300" height="340" rx="10" fill="#b84d68"/>
    <rect width="300" height="44" rx="10" fill="#7a2f45"/>
    <rect y="34" width="300" height="10" fill="#7a2f45"/>
    <text x="16" y="30" class="card-h">Login_UyeOl</text>
    <text x="230" y="30" class="card-tag">Form</text>
    <rect y="44" width="300" height="52" fill="#c96378"/>
    <text x="14" y="64" class="card-vars">- connectionString: string</text>
    <text x="14" y="82" class="card-vars">- adminForm, standartForm, premiumForm</text>
    <text x="14" y="118" class="card-fn">+ Login_UyeOl_Load()</text>
    <text x="14" y="136" class="card-fn">+ UyeOlBtn_Click()</text>
    <text x="14" y="154" class="card-fn">+ AdminGiris_Click()</text>
    <text x="14" y="172" class="card-fn">+ KullaniciGirisKaydet()</text>
    <text x="14" y="190" class="card-fn">- LoginKullaniciAdi_KeyPress()</text>
    <text x="14" y="208" class="card-fn">- LoginSifre_KeyPress()</text>
    <text x="14" y="226" class="card-fn">- TCTextBox_KeyPress()</text>
    <text x="14" y="244" class="card-fn">- UyelikTuru validation</text>
    <text x="14" y="262" class="card-fn">? route by role (Admin / Standart / Premium)</text>
    <text x="14" y="296" class="card-fn">PostgreSQL user lookup via Npgsql</text>
  </g>

  <!-- Form1 guest -->
  <g filter="url(#shadow)" transform="translate(1180, 780)">
    <rect width="260" height="200" rx="10" fill="#b84d68"/>
    <rect width="260" height="44" rx="10" fill="#7a2f45"/>
    <rect y="34" width="260" height="10" fill="#7a2f45"/>
    <text x="16" y="30" class="card-h">Form1</text>
    <text x="190" y="30" class="card-tag">Form</text>
    <rect y="44" width="260" height="40" fill="#c96378"/>
    <text x="14" y="64" class="card-vars">- connectionString, filmOffset</text>
    <text x="14" y="100" class="card-fn">+ Form1_Load()</text>
    <text x="14" y="118" class="card-fn">+ FilmListesiniGuncelle()</text>
    <text x="14" y="136" class="card-fn">+ FilmDetayGoster()</text>
    <text x="14" y="154" class="card-fn">- pictureBox_Click()</text>
    <text x="14" y="172" class="card-fn">guest browse — login required</text>
    <text x="14" y="190" class="card-fn">for filter / sort / review</text>
  </g>

  <!-- Standart -->
  <g filter="url(#shadow)" transform="translate(500, 120)">
    <rect width="300" height="280" rx="10" fill="#b84d68"/>
    <rect width="300" height="44" rx="10" fill="#7a2f45"/>
    <rect y="34" width="300" height="10" fill="#7a2f45"/>
    <text x="16" y="30" class="card-h">Standart</text>
    <text x="210" y="30" class="card-tag">Form</text>
    <rect y="44" width="300" height="52" fill="#c96378"/>
    <text x="14" y="64" class="card-vars">- connectionString, filmOffset</text>
    <text x="14" y="82" class="card-vars">- detayForm, profilim</text>
    <text x="14" y="118" class="card-fn">+ Standart_Load()</text>
    <text x="14" y="136" class="card-fn">+ FilmListesiniGuncelle()</text>
    <text x="14" y="154" class="card-fn">+ FilmDetayGoster(filmSira)</text>
    <text x="14" y="172" class="card-fn">+ filmArama() / FilmSirala()</text>
    <text x="14" y="190" class="card-fn">+ KelimeGoreAra(), filter combos</text>
    <text x="14" y="208" class="card-fn">+ NotificationGoster(filmAd)</text>
    <text x="14" y="226" class="card-fn">property KullaniciID: int</text>
    <text x="14" y="256" class="card-fn">browse · watchlist · filter · search</text>
  </g>

  <!-- Admin -->
  <g filter="url(#shadow)" transform="translate(500, 440)">
    <rect width="300" height="260" rx="10" fill="#b84d68"/>
    <rect width="300" height="44" rx="10" fill="#7a2f45"/>
    <rect y="34" width="300" height="10" fill="#7a2f45"/>
    <text x="16" y="30" class="card-h">Admin</text>
    <text x="220" y="30" class="card-tag">Form</text>
    <rect y="44" width="300" height="52" fill="#c96378"/>
    <text x="14" y="64" class="card-vars">- connectionString, filmOffset</text>
    <text x="14" y="82" class="card-vars">- detayForm, profilForm</text>
    <text x="14" y="118" class="card-fn">+ Admin_Load()</text>
    <text x="14" y="136" class="card-fn">+ FilmListesiniGuncelle()</text>
    <text x="14" y="154" class="card-fn">+ FilmDetayGoster(), FilmSirala()</text>
    <text x="14" y="172" class="card-fn">+ dataGridViewFilmler_CellClick()</text>
    <text x="14" y="190" class="card-fn">? AdminPanel (film CRUD)</text>
    <text x="14" y="208" class="card-fn">? Profilim (profile)</text>
    <text x="14" y="236" class="card-fn">property KullaniciID: int</text>
  </g>

  <!-- Premium -->
  <g filter="url(#shadow)" transform="translate(500, 740)">
    <rect width="300" height="260" rx="10" fill="#b84d68"/>
    <rect width="300" height="44" rx="10" fill="#7a2f45"/>
    <rect y="34" width="300" height="10" fill="#7a2f45"/>
    <text x="16" y="30" class="card-h">Premium</text>
    <text x="200" y="30" class="card-tag">Form</text>
    <rect y="44" width="300" height="52" fill="#c96378"/>
    <text x="14" y="64" class="card-vars">- connectionString, filmOffset</text>
    <text x="14" y="82" class="card-vars">- detayForm, profilim</text>
    <text x="14" y="118" class="card-fn">+ Premium_Load()</text>
    <text x="14" y="136" class="card-fn">+ FilmDetayGoster(), FilmSirala()</text>
    <text x="14" y="154" class="card-fn">+ filmArama(), filter / sort</text>
    <text x="14" y="172" class="card-fn">+ reviews &amp; ratings (premium)</text>
    <text x="14" y="190" class="card-fn">+ NotificationGoster()</text>
    <text x="14" y="208" class="card-fn">? FilmDetaylariIncele</text>
    <text x="14" y="236" class="card-fn">property KullaniciID: int</text>
  </g>

  <!-- AdminPanel -->
  <g filter="url(#shadow)" transform="translate(80, 280)">
    <rect width="280" height="240" rx="10" fill="#b84d68"/>
    <rect width="280" height="44" rx="10" fill="#7a2f45"/>
    <rect y="34" width="280" height="10" fill="#7a2f45"/>
    <text x="16" y="30" class="card-h">AdminPanel</text>
    <text x="175" y="30" class="card-tag">Form</text>
    <rect y="44" width="280" height="52" fill="#c96378"/>
    <text x="14" y="64" class="card-vars">- connectionString, filmID</text>
    <text x="14" y="82" class="card-vars">- afisDegisti: bool</text>
    <text x="14" y="118" class="card-fn">+ FilmEkle_Click()</text>
    <text x="14" y="136" class="card-fn">+ DegisiklikKaydet_Click()</text>
    <text x="14" y="154" class="card-fn">+ Sil_Click(), Temizle()</text>
    <text x="14" y="172" class="card-fn">+ FilmAfis_DoubleClick()</text>
    <text x="14" y="190" class="card-fn">+ FilmleriYukle()</text>
    <text x="14" y="208" class="card-fn">poster via MemoryStream</text>
  </g>

  <!-- FilmDetaylariIncele -->
  <g filter="url(#shadow)" transform="translate(920, 120)">
    <rect width="300" height="220" rx="10" fill="#b84d68"/>
    <rect width="300" height="44" rx="10" fill="#7a2f45"/>
    <rect y="34" width="300" height="10" fill="#7a2f45"/>
    <text x="16" y="30" class="card-h">FilmDetaylariIncele</text>
    <text x="175" y="30" class="card-tag">Form</text>
    <rect y="44" width="300" height="40" fill="#c96378"/>
    <text x="14" y="64" class="card-vars">- connectionString, yorumOffset</text>
    <text x="14" y="100" class="card-fn">+ FilmDetaylariIncele_Load()</text>
    <text x="14" y="118" class="card-fn">+ YorumListesiniGuncelle()</text>
    <text x="14" y="136" class="card-fn">+ YorumEkleBtn_Click() (Premium)</text>
    <text x="14" y="154" class="card-fn">film metadata tabs</text>
    <text x="14" y="172" class="card-fn">comments · ratings · watchlist</text>
    <text x="14" y="200" class="card-fn">property FilmDetay, KullaniciID</text>
  </g>

  <!-- FilmDetaylari admin -->
  <g filter="url(#shadow)" transform="translate(920, 380)">
    <rect width="300" height="220" rx="10" fill="#b84d68"/>
    <rect width="300" height="44" rx="10" fill="#7a2f45"/>
    <rect y="34" width="300" height="10" fill="#7a2f45"/>
    <text x="16" y="30" class="card-h">FilmDetaylari</text>
    <text x="190" y="30" class="card-tag">Form</text>
    <rect y="44" width="300" height="40" fill="#c96378"/>
    <text x="14" y="64" class="card-vars">- connectionString, yorumOffset</text>
    <text x="14" y="100" class="card-fn">+ FilmDetaylari_Load()</text>
    <text x="14" y="118" class="card-fn">+ FilmDetaylariniGuncelle()</text>
    <text x="14" y="136" class="card-fn">+ KaydetBtn_Click()</text>
    <text x="14" y="154" class="card-fn">+ YorumSilBtn_Click()</text>
    <text x="14" y="172" class="card-fn">admin edit film + moderate comments</text>
    <text x="14" y="200" class="card-fn">property FilmDetay, KullaniciID</text>
  </g>

  <!-- Profilim -->
  <g filter="url(#shadow)" transform="translate(920, 640)">
    <rect width="300" height="260" rx="10" fill="#b84d68"/>
    <rect width="300" height="44" rx="10" fill="#7a2f45"/>
    <rect y="34" width="300" height="10" fill="#7a2f45"/>
    <text x="16" y="30" class="card-h">Profilim</text>
    <text x="210" y="30" class="card-tag">Form</text>
    <rect y="44" width="300" height="40" fill="#c96378"/>
    <text x="14" y="64" class="card-vars">- connectionString</text>
    <text x="14" y="100" class="card-fn">+ KullaniciBilgileriniGuncelle()</text>
    <text x="14" y="118" class="card-fn">+ IzlenenFilmleriYukle()</text>
    <text x="14" y="136" class="card-fn">+ BuFilmListedeMi()</text>
    <text x="14" y="154" class="card-fn">+ HesapSil_Click()</text>
    <text x="14" y="172" class="card-fn">watchlist add / remove</text>
    <text x="14" y="190" class="card-fn">membership tier switch</text>
    <text x="14" y="208" class="card-fn">property KullaniciID: int</text>
  </g>

  <!-- Domain strip bottom -->
  <g filter="url(#shadow)" transform="translate(80, 1000)">
    <rect width="1340" height="56" rx="8" fill="rgba(122,47,69,0.55)"/>
    <text x="24" y="34" class="card-fn">Domain: Kullanici ? PremiumKullanici · StandartKullanici · AdminKullanici · Film · FilmYorum</text>
    <text x="780" y="34" class="card-fn">Stack: C# · WinForms · PostgreSQL · Npgsql · Material Skin · Notifcylon</text>
  </g>

  <!-- Edges -->
  <g fill="none" stroke="#ffffff" stroke-width="2.2" marker-end="url(#arrow)">
    <path d="M 230 620 L 230 540 L 380 540 L 380 700"/>
    <path d="M 280 790 L 500 870"/>
    <path d="M 380 430 L 380 400 L 650 260 L 800 260"/>
    <path d="M 380 700 L 650 860 L 800 860 L 920 780"/>
    <path d="M 650 570 L 920 490"/>
    <path d="M 650 300 L 920 230"/>
    <path d="M 800 570 L 920 750"/>
    <path d="M 360 520 L 360 440"/>
    <path d="M 1180 780 L 1100 300 L 920 230"/>
    <path d="M 230 620 L 230 400 L 80 400 L 80 380" marker-end="none"/>
  </g>

  <!-- Edge labels -->
  <text x="388" y="388" class="edge-label">-adminForm</text>
  <text x="300" y="610" class="edge-label">-standartForm</text>
  <text x="300" y="820" class="edge-label">-premiumForm</text>
  <text x="720" y="248" class="edge-label">-detayForm</text>
  <text x="860" y="500" class="edge-label">-detayForm</text>
  <text x="860" y="770" class="edge-label">-detayForm</text>
  <text x="720" y="558" class="edge-label">-profilForm</text>
  <text x="1000" y="720" class="edge-label">-profilForm</text>
  <text x="1050" y="520" class="edge-label">-Form1</text>
  <text x="330" y="478" class="edge-label">AdminPanel</text>

  <text x="80" y="1068" class="note">Diagram layout inspired by UX case-study architecture boards</text>
</svg>
